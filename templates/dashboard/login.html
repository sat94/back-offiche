<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - MeetVoice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f0f13; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-card {
            background: #1a1a24; border: 1px solid #2a2a35; border-radius: 16px;
            padding: 3rem; width: 100%; max-width: 420px;
        }
        .login-card h2 { color: #a29bfe; font-weight: 700; }
        .form-control {
            background: #0f0f13; border: 1px solid #2a2a35; color: #e0e0e0;
            border-radius: 8px; padding: .7rem 1rem;
        }
        .form-control:focus { border-color: #6c5ce7; box-shadow: 0 0 0 2px rgba(108,92,231,.2); }
        .btn-primary { background: #6c5ce7; border: none; border-radius: 8px; padding: .7rem; }
        .btn-primary:hover { background: #5b4bd5; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-soundwave" style="font-size: 3rem; color: #a29bfe;"></i>
            <h2 class="mt-2">MeetVoice</h2>
            <p class="text-muted">Back Office</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger py-2">Identifiants incorrects.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small text-muted">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted">Mot de passe</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>
    </div>
</body>
</html>
